bundle:
  name: tp2_olist_databricks

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

targets:
  staging:
    default: true
    mode: development
    workspace:
      host: https://dbc-f9db1b6c-e8d6.cloud.databricks.com

resources:
  jobs:
    tp2_olist_pipeline_job:
      name: tp2_olist_pipeline_job

      tasks:
        - task_key: run_setup_landing_zone
          notebook_task:
            notebook_path: ./notebooks/01_setup_landing_zone.ipynb

        - task_key: run_medallion_pipeline
          depends_on:
            - task_key: run_setup_landing_zone
          notebook_task:
            notebook_path: ./notebooks/02_pipeline_medallion_delta.ipynb